version: 2
project: vibe-2025

commands:
  install:
    help: install Python deps (uv) and frontend (npm)
    exec: |
      uv sync --group dev
      npm install --prefix frontend

  dev:
    help: local development servers (use subcommands api / ui)
    commands:
      api:
        help: FastAPI with reload on port 8000
        exec: |
          cd fastapi && uv run uvicorn main:app --reload --host 0.0.0.0 --port 8000
      ui:
        help: Vite dev server (proxies /api to FastAPI on 8000)
        exec: |
          cd frontend && npm run dev

  docker:
    help: API container (use subcommands build / run / compose)
    commands:
      build:
        help: build image from repo root context
        exec: |
          docker build -f fastapi/Dockerfile -t vibe-2025 .
      run:
        help: run container on port 8000 (expects fastapi/.env)
        deps:
          - docker.build
        exec: |
          docker run --rm -p 8000:8000 --env-file fastapi/.env vibe-2025
      compose:
        help: docker compose up -d from fastapi/ (expects fastapi/.env)
        exec: |
          cd fastapi && docker compose up -d

  post:
    help: HTTP smoke requests (use subcommand mcqs)
    commands:
      mcqs:
        help: POST /mcqs — requires API on :8000, AWS env, real s3_uri in the script if needed
        exec: |
          curl -sS -X POST http://localhost:8000/mcqs \
            -H "Content-Type: application/json" \
            -d '{"s3_uri":"s3://your-bucket/path/to.pdf","max_questions":10}'

  frontend:
    help: frontend tooling (use subcommand build)
    commands:
      build:
        help: TypeScript check and Vite production build
        exec: |
          npm --prefix frontend run build
