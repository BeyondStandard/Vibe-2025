services:
  api:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: fastapi/Dockerfile
    ports:
      - mode: ingress
        target: 8000
        published: 8000
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
